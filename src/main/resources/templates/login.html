<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OpenPunch - Access System</title>
    <link rel="stylesheet" href="../static/css/style.css" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

</head>
<body class="login-page">
<main class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <h1>IES La Sènia</h1>
            <p>Attendance Tracking System</p>
        </div>

        <form th:action="@{/login}" method="post" class="user-form">
            <!-- Mensajes de error con estilo de alerta del CSS -->
            <div th:if="${param.error}" class="alert alert-danger">
                <span>Invalid credentials.</span>
            </div>

            <!-- Añadir debajo del mensaje de error en login.html -->
            <div th:if="${param.logout}" class="alert alert-success">
                <span>You have been signed out successfully.</span>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="user" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <div class="login-footer">
            <small>Made by <a style="color:#C6CBCF" href="https://github.com/marcelgb-dev">Marcel Garcia</a></small>
        </div>
    </div>
</main>
</body>
</html>
