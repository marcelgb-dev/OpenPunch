<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>OpenPunch - Access System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-page"> <!-- Clase añadida para el fondo especial -->
<main class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <h1>OpenPunch</h1>
            <p>Attendance Control System</p>
        </div>

        <form th:action="@{/login}" method="post" class="user-form">
            <h2>System Access</h2>

            <!-- Mensajes de error con estilo de alerta del CSS -->
            <div th:if="${param.error}" class="alert alert-danger">
                <span>Invalid credentials.</span>
            </div>

            <!-- Añadir debajo del mensaje de error en login.html -->
            <div th:if="${param.logout}" class="alert alert-success">
                <span>You have been signed out successfully.</span>
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="user" required autofocus>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>

        <div class="login-footer">
            <small>&copy; 2026 OpenPunch Architecture</small>
        </div>
    </div>
</main>
</body>
</html>
