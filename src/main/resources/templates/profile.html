<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>User Profile - OpenPunch</title>
    <link rel="stylesheet" href="../static/css/style.css" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

</head>
<body>
<div class="container">
    <header>
        <h1 th:text="${user.name} + ' ' + ${user.surname}">User Name</h1>
        <div class="header-actions">
            <a sec:authorize="hasRole('ADMIN')" href="/users" class="btn btn-primary">
                <span class="material-symbols-outlined">keyboard_return</span>
                Back
            </a>

            <form th:action="@{/users/edit}" method="post">
                <input type="hidden" name="userId" th:value="${user.id}" />
                <button type="submit" class="btn btn-primary">
                    <span class="material-symbols-outlined">edit</span>
                    Edit User
                </button>
            </form>

            <form sec:authorize="hasRole('ADMIN')" th:action="@{/users/delete}" method="post">
                <input type="hidden" name="userId" th:value="${user.id}" />
                <button type="submit" class="btn btn-logout"
                        th:onclick="return confirm('Are you sure? This will remove all Work Sessions, Punch Logs and User details of ' + [[${user.name}]] + '.');">
                    <span class="material-symbols-outlined">delete</span>
                    Delete User
                </button>
            </form>

            <form th:action="@{/logout}" method="post" style="display: contents;">
                <button type="submit" class="btn btn-logout">
                    <span class="material-symbols-outlined">logout</span>
                    Log Out
                </button>
            </form>
        </div>
    </header>

    <div style="display: flex; gap: 40px; align-items: flex-start; margin-bottom: 40px;">

        <div style="flex: 1;">
            <div class="form-group">
                <label>System Role</label>
                <div style="margin-top: 5px;">
                        <span class="status"
                              th:style="${user.role == 3} ? 'background:#ebedff; color:#34495e;' : ''"
                              th:classappend="${user.role == 2} ? 'status-in' : (${user.role == 1} ? 'status-out' : '')"
                              th:text="${user.role == 1} ? 'ADMIN' : (${user.role == 3} ? 'USER' : 'SCANNER')">
                        </span>
                </div>
            </div>

            <div class="form-group">
                <label>Current Status</label>
                <div style="margin-top: 5px;">
                    <div th:class="${user.active} ? 'status status-in' : 'status status-out'" style="font-size:14px; padding:10px;">
                        <span th:text="${user.active} ? 'Active' : 'Inactive'"></span>

                        <span th:if="${user.lastLog != null and user.lastLog.logTime != null}">
                            since <strong th:text="${#temporals.format(user.lastLog.logTime, 'HH:mm')}">15:00</strong>

                            <th:block th:with="diff=${T(java.time.Duration).between(user.lastLog.logTime, now)}">
                                <th:block th:with="days=${diff.toDays()},
                                                   hours=${diff.toHours() % 24},
                                                   mins=${diff.toMinutes() % 60}">
                                    -
                                    <span th:if="${days > 0}" th:text="${days} + 'd '"></span>
                                    <span th:if="${hours > 0}" th:text="${hours} + 'h '"></span>
                                    <span th:text="${mins} + ' min ago'">15min ago</span>
                                </th:block>
                            </th:block>
                        </span>

                        <span th:if="${user.lastLog == null}" style="font-style: italic; opacity: 0.8; margin-left: 5px;">
                            - No logs yet
                        </span>
                    </div>
                </div>
            </div>

            <div sec:authorize="hasRole('ADMIN')" class="form-group" style="margin-top: 20px;">
                <label>Personal Token (Internal)</label>
                <code style="display: block; background: #f8f9fa; padding: 12px; border-radius: 6px; border: 1px solid #eee; font-size: 0.85rem; color: #666; margin-top: 5px;"
                      th:text="${user.token}">
                    token-placeholder
                </code>
            </div>
            <div sec:authorize="hasRole('ADMIN')" class="form-group" style="margin-top: 20px;">
                <a sec:authorize="hasRole('ADMIN')" th:href="@{/punch(token=${user.token})}"
                   class="btn btn-punch">
                    Punch
                </a>
            </div>
            <div class="alert-container" style="margin-top: 20px;">
                <div th:if="${success}" class="alert alert-success">
                    <span th:text="${success}"></span>
                    <button class="close-btn" onclick="this.parentElement.style.display='none'">&times;</button>
                </div>
                <div th:if="${error}" class="alert alert-danger">
                    <span th:text="${error}"></span>
                    <button class="close-btn" onclick="this.parentElement.style.display='none'">&times;</button>
                </div>
            </div>
        </div>

    </div>

    <div class="logs-section">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; margin-bottom: 20px;">
            <h3>Work Sessions</h3>
            <h3>Total worktime logged:
                <span th:text="${#numbers.formatInteger(totalHours, 2) + 'h ' + #numbers.formatInteger(totalMinutes, 2) + 'min'}">45h 30min</span>
            </h3>
        </div>


        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Start time</th>
                <th>End time</th>
                <th>Duration</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="ses : ${sessions}">
                <td th:text="${ses.id}">1</td>

                <td class="timestamp status-in"
                    th:text="${#temporals.format(ses.startTime, 'dd/MM/yyyy - HH:mm:ss')}">
                    15:00
                </td>

                <td th:if="${ses.endTime != null}" class="timestamp status-out">
                    <span th:text="${#temporals.format(ses.endTime, 'dd/MM/yyyy - HH:mm:ss')}">
                        21:00
                    </span>
                </td>
                <td th:if="${ses.endTime == null}">
                    <span style="color: #95a5a6; font-style: italic;">
                        --/--/-- - --:--:--
                    </span>
                </td>

                <td>
                    <th:block th:if="${ses.endTime != null}"
                              th:with="hours=${ses.durationMinutes / 60}, mins=${ses.durationMinutes % 60}">
                <span th:text="${#numbers.formatInteger(hours, 2) + 'h ' + #numbers.formatInteger(mins, 2) + 'min'}">
                    07h 50m
                </span>
                    </th:block>
                <span th:if="${ses.endTime == null}">
                    Ongoing work session...
                </span>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(sessions)}">
                <td colspan="4" style="text-align: center; color: #95a5a6; padding: 30px;">
                    No activity recorded for this user yet.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
