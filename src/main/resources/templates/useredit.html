<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Edit User - Open Punch</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container" style="max-width: 600px;">
    <header>
        <h1>Edit User</h1>
        <a href="/users" class="btn btn-outline">Go Back</a>
    </header>

    <form th:action="@{/users/update}" th:object="${user}" method="post" class="user-form">
        <input type="text" th:field="*{id}" hidden>

        <div class="form-row">
            <div class="form-group">
                <label>Name</label>
                <input type="text" th:field="*{name}" required>
            </div>
            <div class="form-group">
                <label>Surname</label>
                <input type="text" th:field="*{surname}">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Role</label>
                <select th:field="*{role}" required>
                    <option value="" disabled>Select a role</option>
                    <option value="1">Admin</option>
                    <option value="2">Scanner</option>
                    <option value="3">User</option>
                </select>
            </div>
        </div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

        <div class="form-group">
            <label>Username</label>
            <input type="text" th:field="*{username}" required>
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" th:field="*{password}" placeholder="Leave empty to keep the previous password">
        </div>

        <div class="form-group">
            <label>Token</label>
            <input type="text" th:field="*{token}">
        </div>

        <button type="submit" class="btn btn-outline" style="width: 100%; margin-top: 20px; padding: 12px;">
            Save User
        </button>
    </form>
</div>

</body>
</html>
