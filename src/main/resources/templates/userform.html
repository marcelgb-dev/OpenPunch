<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nuevo Usuario - oPunch</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container" style="max-width: 600px;">
  <header>
    <h1>Nuevo Usuario</h1>
    <a href="/users" class="btn btn-outline">Volver</a>
  </header>

  <form th:action="@{/users/save}" th:object="${user}" method="post" class="user-form">

    <div class="form-row">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" th:field="*{name}" required placeholder="Ej: Juan">
      </div>
      <div class="form-group">
        <label>Apellido</label>
        <input type="text" th:field="*{surname}" required placeholder="Ej: Pérez">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Group</label>
        <input type="text" th:field="*{groupId}" placeholder="1, 2, 3...">
      </div>
      <div class="form-group">
        <label>Role</label>
        <select th:field="*{role}" required>
          <option value="" disabled selected>Selecciona un rol</option>
          <option value="1">Admin</option>
          <option value="2">User</option>
          <option value="3">Scanner</option>
        </select>
      </div>
    </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

    <div class="form-group">
      <label>Username</label>
      <input type="text" th:field="*{username}" required placeholder="juan.perez">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" th:field="*{password}" required placeholder="••••••••">
    </div>

    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px; padding: 12px;">
      Crear Usuario y Generar QR
    </button>
  </form>
</div>

</body>
</html>
