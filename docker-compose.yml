services:
  # --- Base de Datos ---
  db:
    image: mysql:8.0-oracle
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    container_name: openpunch-database
    restart: always
    environment:
      - TZ=Europe/Madrid
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=openpunch # Obligatorio para que funcionen los scripts de init
    networks:
      - backend-private
    volumes:
      # PERSISTENCIA: Bind-mount local (Ignorado en git)
      - ./docker/mysql/data:/var/lib/mysql
      # INICIALIZACIÓN: Scripts SQL (Dentro de git)
      - ./docker/mysql/init:/docker-entrypoint-initdb.d

  # --- Spring Boot ---
  app:
    build: .
    container_name: openpunch-app
    restart: always
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - TZ=${TIMEZONE}
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/openpunch?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=${TIMEZONE}
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${DB_ROOT_PASSWORD}
      - MAX_SESSION_DURATION=${MAX_SESSION_DURATION}
      - MIN_SESSION_DURATION=${MIN_SESSION_DURATION}
    networks:
      - backend-private
  # --- Proxy Inverso (Nginx) ---
  proxy:
    image: nginx:stable-alpine
    container_name: openpunch-proxy
    restart: always
    ports:
      - "${HOST_PORT}:80"
      - "${HOST_PORT_SSL}:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/html/error.html:/usr/share/nginx/html/error.html:ro
      #- ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - frontend-public
      - backend-private

networks:
  frontend-public:
    driver: bridge
  backend-private:
    internal: true
    
