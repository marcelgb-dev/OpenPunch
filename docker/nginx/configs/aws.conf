server {
    listen 80;
    server_name openpunch.yatat.es;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name openpunch.yatat.es;

    ssl_certificate     /etc/nginx/certs/aws/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/aws/privkey.pem;

    location / {
        proxy_pass http://openpunch-app:8080;
        include /etc/nginx/conf.d/proxy_params; # Opcional: meter headers comunes aquí
    }
}