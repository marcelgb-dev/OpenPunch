server {
    listen 80;
    server_name tic.ieslasenia.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tic.ieslasenia.org;

    ssl_certificate     /etc/nginx/certs/ies/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/ies/privkey.pem;

    location / {
        proxy_pass http://openpunch-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}